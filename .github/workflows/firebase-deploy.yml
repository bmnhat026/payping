# Tự động deploy PingPay lên Firebase mỗi khi push vào main.
# Deploy cả Hosting, Firestore rules và indexes.
#
# YÊU CẦU CẤU HÌNH (làm 1 lần):
#   Vào repo > Settings > Secrets and variables > Actions > New repository secret
#   - Name:  FIREBASE_SERVICE_ACCOUNT
#   - Value: toàn bộ nội dung file JSON của service account Firebase
#            (Firebase Console > Project settings > Service accounts > Generate new private key)
#   Service account cần quyền: Firebase Hosting Admin + Cloud Datastore Owner
#   (hoặc đơn giản là role "Editor" của project pingpay-16a26).

name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # cho phép bấm deploy thủ công từ tab Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "${{ github.workspace }}/firebase-sa.json"

      - name: Deploy hosting + Firestore rules & indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-sa.json
        run: |
          firebase deploy \
            --only hosting,firestore:rules,firestore:indexes \
            --project pingpay-16a26 \
            --non-interactive
